    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            overflow: hidden;
        }

        .animation-container {
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        .access-granted {
            font-family: 'Orbitron', monospace;
            font-size: 4rem;
            font-weight: 700;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 
                0 0 5px var(--neon-green),
                0 0 10px var(--neon-green),
                0 0 20px var(--neon-green),
                0 0 40px var(--neon-green),
                0 0 80px var(--neon-green);
            animation: neonPulse 1.5s ease-in-out infinite alternate, textGlitch 0.2s ease-in-out 3;
            margin-bottom: 1rem;
        }

        .admin-message {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            color: var(--neon-blue);
            text-shadow: 
                0 0 5px var(--neon-blue),
                0 0 10px var(--neon-blue),
                0 0 20px var(--neon-blue);
            animation: slideUp 0.8s ease-out 0.3s both, neonPulseBlue 2s ease-in-out infinite alternate;
            letter-spacing: 2px;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
            animation: scanLine 1.5s linear infinite;
            opacity: 0.6;
            pointer-events: none;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            animation: gridMove 20s linear infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes neonPulse {
            from {
                text-shadow: 
                    0 0 5px var(--neon-green),
                    0 0 10px var(--neon-green),
                    0 0 20px var(--neon-green),
                    0 0 40px var(--neon-green);
            }
            to {
                text-shadow: 
                    0 0 10px var(--neon-green),
                    0 0 20px var(--neon-green),
                    0 0 40px var(--neon-green),
                    0 0 80px var(--neon-green),
                    0 0 120px var(--neon-green);
            }
        }

        @keyframes neonPulseBlue {
            from {
                text-shadow: 
                    0 0 5px var(--neon-blue),
                    0 0 10px var(--neon-blue),
                    0 0 20px var(--neon-blue);
            }
            to {
                text-shadow: 
                    0 0 10px var(--neon-blue),
                    0 0 20px var(--neon-blue),
                    0 0 40px var(--neon-blue),
                    0 0 60px var(--neon-blue);
            }
        }

        @keyframes textGlitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
        }

        @keyframes scanLine {
            0% { top: 0; opacity: 0.8; }
            100% { top: 100vh; opacity: 0.2; }
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .access-granted {
                font-size: 2rem;
                letter-spacing: 2px;
            }
            
            .admin-message {
                font-size: 1rem;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="scan-line"></div>
    
    <div class="animation-container">
        <div class="access-granted">ACCESS GRANTED</div>
        <div class="admin-message">Opening Admin Dashboard...</div>
    </div>

    <script>
        // Redirect to admin page after 1.5 seconds
        setTimeout(function() {
            window.location.href = 'admin.html';
        }, 1500);

        // Authentication check
        document.addEventListener('DOMContentLoaded', function() {
            const currentUser = localStorage.getItem("storeUsername");
            const userRole = localStorage.getItem("userRole");
            
            if (!currentUser || userRole !== "admin") {
                // Not authorized - redirect to login
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
